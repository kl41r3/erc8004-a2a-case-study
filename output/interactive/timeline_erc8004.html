<script>
const dots = [{"author": "dcrapis", "date_ts": 1755148832541, "stance": "Neutral", "argument_type": "Technical", "key_point": "Proposes extending A2A protocol with trust layer via three on-chain registries for cross-organizational agent interaction.", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "leonprou", "date_ts": 1755433803050, "stance": "Neutral", "argument_type": "Off-topic", "key_point": "Expressing interest in A2A compatibility and offering to collaborate on agent collaboration framework.", "row_idx": 24, "institution": "Independent"}, {"author": "spengrah", "date_ts": 1755547032788, "stance": "Modify", "argument_type": "Technical", "key_point": "Standard prioritizes offchain reads over onchain reads, missing opportunity for onchain composability and permissioned onchain actions", "row_idx": 4, "institution": "Hats Protocol"}, {"author": "felixnorden", "date_ts": 1755621534342, "stance": "Support", "argument_type": "Technical", "key_point": "Reputation registry should support multiple scores from multiple providers to reduce bias and serve as single entry point.", "row_idx": 10, "institution": "Mure"}, {"author": "sbacha", "date_ts": 1755732923204, "stance": "Neutral", "argument_type": "Technical", "key_point": "Reputons from RFC 7071 are suited for SLA/Uptime metrics rather than credibility-based token curation.", "row_idx": 25, "institution": "Independent"}, {"author": "mlegls", "date_ts": 1755758064489, "stance": "Support", "argument_type": "Technical", "key_point": "Advocates keeping ERC core minimal with optional extension ERCs for additional on-chain functionality like validation interfaces.", "row_idx": 27, "institution": "Independent"}, {"author": "daniel-ospina", "date_ts": 1755768515029, "stance": "Oppose", "argument_type": "Technical", "key_point": "Oppose single aggregate reputation score; advocate modular approach allowing multiple reputation systems to emerge organically.", "row_idx": 8, "institution": "RnDAO"}, {"author": "comeToThinkOfEth", "date_ts": 1755775930841, "stance": "Neutral", "argument_type": "Economic", "key_point": "Proposes creating an ETH-denominated economy for AI agents to build ETH network effects, similar to NFT adoption.", "row_idx": 28, "institution": "Independent"}, {"author": "felixnorden", "date_ts": 1755779907002, "stance": "Support", "argument_type": "Technical", "key_point": "Registry should enable multiple providers to offer aggregate scores for agents to compare performance and identify best options.", "row_idx": 10, "institution": "Mure"}, {"author": "pcarranzav", "date_ts": 1755875268438, "stance": "Modify", "argument_type": "Technical", "key_point": "Suggests using URLs instead of domains for agent cards and requesting detailed Solidity contract interface specifications including registration costs.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "azanux", "date_ts": 1755956446858, "stance": "Modify", "argument_type": "Economic", "key_point": "The specification should include payment handling between agents and gas costs for collaboration", "row_idx": 29, "institution": "Independent"}, {"author": "KBryan", "date_ts": 1755988527055, "stance": "Neutral", "argument_type": "Process", "key_point": "Author notes work on related ERC-8001 for Agent-to-Agent coordination and sees synergies with ERC-8004.", "row_idx": 30, "institution": "Independent"}, {"author": "MarcoMetaMask", "date_ts": 1756032059338, "stance": "Neutral", "argument_type": "Process", "key_point": "Asking if ERC-8001 (consensus among agents) is orthogonal to ERC-8004", "row_idx": 0, "institution": "MetaMask"}, {"author": "MarcoMetaMask", "date_ts": 1756033681060, "stance": "Neutral", "argument_type": "Technical", "key_point": "Questioning rationale for off-chain Rating/Response, asking what data should be on-chain and what use cases exist.", "row_idx": 0, "institution": "MetaMask"}, {"author": "MarcoMetaMask", "date_ts": 1756034393471, "stance": "Support", "argument_type": "Technical", "key_point": "Protocol remains unopinionated on payments but encourages optional payment proofs and interoperable with x402 payment extension.", "row_idx": 0, "institution": "MetaMask"}, {"author": "spengrah", "date_ts": 1756047318656, "stance": "Oppose", "argument_type": "Technical", "key_point": "Trust is contextual, not universal; single reputation scores enable monopolies; modularity and async oracles are needed.", "row_idx": 4, "institution": "Hats Protocol"}, {"author": "spengrah", "date_ts": 1756050007777, "stance": "Modify", "argument_type": "Technical", "key_point": "Advocates storing more on-chain data (events, optional feedback records) rather than only aggregated ratings, asks for use cases.", "row_idx": 4, "institution": "Hats Protocol"}, {"author": "MarcoMetaMask", "date_ts": 1756105689337, "stance": "Support", "argument_type": "Technical", "key_point": "Clarifies mandatory AgentCard exposure at well-known location, supports subdomain-per-agent structure, and confirms singleton-per-chain goal.", "row_idx": 0, "institution": "MetaMask"}, {"author": "gpt3_eth", "date_ts": 1756110366821, "stance": "Modify", "argument_type": "Technical", "key_point": "ERC-8004 should focus on trust primitives, not payment flows, but allow lightweight payment proof references for correlation.", "row_idx": 31, "institution": "Independent"}, {"author": "pcarranzav", "date_ts": 1756133676067, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes using URLs instead of domains for agent registration and asks how domain ownership would be validated.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "mlegls", "date_ts": 1756172822537, "stance": "Modify", "argument_type": "Technical", "key_point": "Asking for use cases of single non-aggregated entries and identifying design flaws in escrow implementation examples.", "row_idx": 27, "institution": "Independent"}, {"author": "mlegls", "date_ts": 1756173247960, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking how contracts validate domain ownership, noting ERC requires on-chain identifiers like agentAddress and FeedbackAuthID", "row_idx": 27, "institution": "Independent"}, {"author": "pcarranzav", "date_ts": 1756177245541, "stance": "Oppose", "argument_type": "Technical", "key_point": "ERC lacks on-chain verification mechanism, allowing malicious actors to claim domains they don't own, causing conflicts with legitimate owners.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "SumeetChougule", "date_ts": 1756226302893, "stance": "Support", "argument_type": "Technical", "key_point": "Proposes adding reportIncident function with crypto-economic bond mechanism to ERC-8004 for flagging agent failures.", "row_idx": 6, "institution": "Nethermind"}, {"author": "pcarranzav", "date_ts": 1756227593295, "stance": "Modify", "argument_type": "Technical", "key_point": "Implementation has DoS vulnerability where anyone can register domains, blocking legitimate owners from registering agents.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "SumeetChougule", "date_ts": 1756227694443, "stance": "Support", "argument_type": "Technical", "key_point": "Supports community collaboration on DoS protection system; will remove 0.005 ETH fee in next version.", "row_idx": 6, "institution": "Nethermind"}, {"author": "daniel-ospina", "date_ts": 1756277640947, "stance": "Neutral", "argument_type": "Technical", "key_point": "Questions whether registry controller would gate valid reputations in ERC-8004 design", "row_idx": 8, "institution": "RnDAO"}, {"author": "KBryan", "date_ts": 1756303075431, "stance": "Neutral", "argument_type": "Technical", "key_point": "ERC-8004 provides on-chain trust and discovery for agents while ERC-8001 provides cryptographic envelopes for action exchange between them.", "row_idx": 30, "institution": "Independent"}, {"author": "dcrapis", "date_ts": 1756318689175, "stance": "Support", "argument_type": "Technical", "key_point": "Adding onchain read functions for event data is justified by trustless composability benefits despite on-chain costs.", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "azanux", "date_ts": 1756325852947, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asks why ERC-8004 doesn't standardize function names like ERC-20 does, concerned about interoperability issues across implementations.", "row_idx": 29, "institution": "Independent"}, {"author": "Nithin-Varma", "date_ts": 1756356394082, "stance": "Modify", "argument_type": "Economic", "key_point": "Proposes adding bond/staking mechanism to ERC-8004 to create economic guarantees and deter spam in agent interactions.", "row_idx": 32, "institution": "Independent"}, {"author": "felixnorden", "date_ts": 1756384108901, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes feedbackURI pattern as middle ground for on-chain feedback storage, balancing storage costs with accessibility.", "row_idx": 10, "institution": "Mure"}, {"author": "azanux", "date_ts": 1756384396181, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes replacing strict AgentAddress requirement with hasAuthorize concept to allow delegated/admin access for NFTs, multisigs, proxies, and recovery scenarios.", "row_idx": 29, "institution": "Independent"}, {"author": "pcarranzav", "date_ts": 1756385722597, "stance": "Oppose", "argument_type": "Technical", "key_point": "Layering external staking mechanisms on top keeps the standard less restrictive than baking bonds directly into it.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "MarcoMetaMask", "date_ts": 1756399400905, "stance": "Support", "argument_type": "Technical", "key_point": "Supports on-chain data with modifications; raises concerns about query endpoints, gas costs, ENS integration, and domain verification", "row_idx": 0, "institution": "MetaMask"}, {"author": "spengrah", "date_ts": 1756400698798, "stance": "Modify", "argument_type": "Technical", "key_point": "Bonds for trust signaling should be a modular component composable with the standard, not integrated directly.", "row_idx": 4, "institution": "Hats Protocol"}, {"author": "spengrah", "date_ts": 1756400875581, "stance": "Modify", "argument_type": "Technical", "key_point": "Will adjust interface to return multiple feedback entries; make on-chain string storage optional for actors to decide.", "row_idx": 4, "institution": "Hats Protocol"}, {"author": "MarcoMetaMask", "date_ts": 1756401428302, "stance": "Neutral", "argument_type": "Technical", "key_point": "Questioning whether Validation Registry should run escrow mechanism or just log validation results", "row_idx": 0, "institution": "MetaMask"}, {"author": "Nithin-Varma", "date_ts": 1756405240915, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking for clarification on why the proposal is considered too restrictive", "row_idx": 32, "institution": "Independent"}, {"author": "pcarranzav", "date_ts": 1756406673013, "stance": "Modify", "argument_type": "Technical", "key_point": "resolveByDomain with 1 agent per domain fails without onchain domain verification, causing DoS risk; URIs would be more flexible", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "pcarranzav", "date_ts": 1756407488055, "stance": "Oppose", "argument_type": "Technical", "key_point": "Opinionated bond mechanisms are too restrictive; allow agents/users to choose their own cryptoeconomic security mechanisms.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "deiu", "date_ts": 1756476093969, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking about implementation status of ERC-8004 for cross-chain identity reuse without re-registration or fees.", "row_idx": 33, "institution": "Independent"}, {"author": "micheda", "date_ts": 1756477296187, "stance": "Modify", "argument_type": "Technical", "key_point": "Suggests adding SPEX probabilistic sampling to complement validation registry for reduced cost and latency.", "row_idx": 34, "institution": "Independent"}, {"author": "SumeetChougule", "date_ts": 1756627419208, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes adding optional commit-reveal scheme for front-running protection and feedback authorization revocation to ERC-8004.", "row_idx": 6, "institution": "Nethermind"}, {"author": "node0", "date_ts": 1756691493213, "stance": "Modify", "argument_type": "Technical", "key_point": "Concern that LLM is not part of agent signature, creating trust and validation gaps for consistent agent behavior.", "row_idx": 35, "institution": "Independent"}, {"author": "vkpatva", "date_ts": 1756693431699, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes extending ERC-8004 AgentInfo with DID support via new field, mapping, and resolveByDID function for SSI interoperability.", "row_idx": 36, "institution": "Independent"}, {"author": "dcrapis", "date_ts": 1756700056544, "stance": "Neutral", "argument_type": "Governance-Principle", "key_point": "Cross-chain functionality needed for ERC-8004 next version, seeking community input", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "dcrapis", "date_ts": 1756700232448, "stance": "Support", "argument_type": "Technical", "key_point": "Sampling-based validation is compatible with current ERC-8004 design and warrants further research.", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "dcrapis", "date_ts": 1756700628507, "stance": "Support", "argument_type": "Technical", "key_point": "Supports optional commit-reveal scheme as security enhancement while maintaining simple direct registration path.", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "dcrapis", "date_ts": 1756700947504, "stance": "Modify", "argument_type": "Technical", "key_point": "For Agent Services using specific LLMs, re-execution or attestation should verify the LLM type; otherwise rely on reputation.", "row_idx": 1, "institution": "Ethereum Foundation"}, {"author": "SumeetChougule", "date_ts": 1756708371032, "stance": "Support", "argument_type": "Economic", "key_point": "Dual path approach maintains backward compatibility while addressing high-value use cases.", "row_idx": 6, "institution": "Nethermind"}, {"author": "deiu", "date_ts": 1756712860690, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking how to test interoperability for ERC-8004 implementations", "row_idx": 33, "institution": "Independent"}, {"author": "MarcoMetaMask", "date_ts": 1756715109264, "stance": "Oppose", "argument_type": "Governance-Principle", "key_point": "IncidentRegistry is out of scope; failures already covered by reputation, stake, TEE mechanisms", "row_idx": 0, "institution": "MetaMask"}, {"author": "MarcoMetaMask", "date_ts": 1756716013031, "stance": "Modify", "argument_type": "Technical", "key_point": "Developers should use singleton registries rather than deploying their own; consider leveraging existing standards for delegation.", "row_idx": 0, "institution": "MetaMask"}, {"author": "MarcoMetaMask", "date_ts": 1756719302887, "stance": "Neutral", "argument_type": "Technical", "key_point": "Analyzing storage cost tradeoffs: 2x gas for additional bytes32 fields versus on-chain data accessibility benefits.", "row_idx": 0, "institution": "MetaMask"}, {"author": "pcarranzav", "date_ts": 1756810577853, "stance": "Modify", "argument_type": "Technical", "key_point": "Remove resolveByDomain and allow multiple agents per domain to prevent DoS attacks on popular domains.", "row_idx": 5, "institution": "Edge and Node / The Graph Protocol"}, {"author": "soispoke", "date_ts": 1756831601149, "stance": "Modify", "argument_type": "Technical", "key_point": "Suggests adding hard cryptography alongside TEEs in crypto-verifiability trust model for stronger guarantees.", "row_idx": 37, "institution": "Independent"}, {"author": "bransdotcom", "date_ts": 1756940476120, "stance": "Modify", "argument_type": "Technical", "key_point": "AgentIDs should be deterministic across chains instead of incrementing per chain to ensure consistency.", "row_idx": 38, "institution": "Independent"}, {"author": "bransdotcom", "date_ts": 1756989512905, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes keccak256 hash of agentDomain and agentAddress for content-addressable agentId with optional address(this) for singleton uniqueness", "row_idx": 38, "institution": "Independent"}, {"author": "sarkazein", "date_ts": 1757053183426, "stance": "Support", "argument_type": "Technical", "key_point": "Suggests DID as unique identifier alongside domain for ERC-8004", "row_idx": 39, "institution": "Independent"}, {"author": "felixnorden", "date_ts": 1757091407795, "stance": "Modify", "argument_type": "Technical", "key_point": "Agree storing full URLs is wasteful; prefer single URI per source; attestations need signatures only to verify agent confirmed the data.", "row_idx": 10, "institution": "Mure"}, {"author": "CertifiedCryp", "date_ts": 1757168141146, "stance": "Support", "argument_type": "Governance-Principle", "key_point": "Incentivizing and rewarding high-trust societal norms will unlock crypto's growth potential.", "row_idx": 40, "institution": "Independent"}, {"author": "MarcoMetaMask", "date_ts": 1757331256608, "stance": "Neutral", "argument_type": "Technical", "key_point": "ERC-8004 uses CAIP-10 for did:pkh and did:ethr compatibility, but lacks on-chain DID resolution for did:web or other methods.", "row_idx": 0, "institution": "MetaMask"}, {"author": "kinglouis", "date_ts": 1757488433416, "stance": "Support", "argument_type": "Technical", "key_point": "Positive reception noting ERC aligns with academic research on agent registries and reputation systems.", "row_idx": 41, "institution": "Independent"}, {"author": "jdutreve", "date_ts": 1757514538090, "stance": "Modify", "argument_type": "Technical", "key_point": "Without on-chain ratings or cryptographic linking, ERC-8004's trust and immutability guarantees are severely weakened", "row_idx": 9, "institution": "Carrefour"}, {"author": "orgtrust.eth", "date_ts": 1757518272698, "stance": "Modify", "argument_type": "Technical", "key_point": "Proposes ENS integration for agent domain verification and clarification on trust evaluation at org versus agent level", "row_idx": 42, "institution": "Independent"}, {"author": "orgtrust.eth", "date_ts": 1757524524547, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking about feasibility of using did:web with did.json containing agent eth address references and requiring both did:web and agent-card well-known files.", "row_idx": 42, "institution": "Independent"}, {"author": "voidcenter", "date_ts": 1757602408268, "stance": "Support", "argument_type": "Process", "key_point": "Expressed support for ERC-8004, offered to contribute from Sparsity's verifiable computing experience.", "row_idx": 12, "institution": "Sparsity.ai"}, {"author": "voidcenter", "date_ts": 1757602657684, "stance": "Modify", "argument_type": "Technical", "key_point": "TEE on-chain verification can exceed gas limits; recommend batch verification off-chain using Sparsity design.", "row_idx": 12, "institution": "Sparsity.ai"}, {"author": "azanux", "date_ts": 1757892087199, "stance": "Modify", "argument_type": "Technical", "key_point": "Advocates for multi-registry specification over singleton to allow use-case-specific registries with different fees and policies", "row_idx": 29, "institution": "Independent"}, {"author": "rithikha", "date_ts": 1757999425158, "stance": "Neutral", "argument_type": "Technical", "key_point": "Asking about cross-chain identity portability and validation evidence extension for ERC-8004", "row_idx": 43, "institution": "Independent"}, {"author": "peersky", so", "label": "McOso", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "VickyFu", "label": "VickyFu", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "Spaded", "label": "Spaded", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "Eth", "label": "Eth", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "nuhgid", "label": "nuhgid", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "S8ken", "label": "S8ken", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "CypherVae", "label": "CypherVae", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "wanderosity", "label": "wanderosity", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "lisenokdonbassenok", "label": "lisenokdonbassenok", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "tantodefi", "label": "tantodefi", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "OoXooOx", "label": "OoXooOx", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "BitmineMarine", "label": "BitmineMarine", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "weedeej", "label": "weedeej", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "hjs_foundation", "label": "hjs_foundation", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "Cyberpaisa", "label": "Cyberpaisa", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "theagora", "label": "theagora", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "kimomon", "label": "kimomon", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}, {"is_separator": false, "author": "Walodja1987", "label": "Walodja1987", "institution": "Independent", "band_color": "#111111", "label_color": "#475569"}];
const STANCE_COLORS = {"Support": "#22c55e", "Oppose": "#ef4444", "Modify": "#f97316", "Neutral": "#94a3b8", "Off-topic": "#64748b"};

const ROW_H = 20;        // uniform height for all rows including separators
const SEP_H = 16;        // separator rows are shorter
const LEFT_MARGIN = 210;
const RIGHT_MARGIN = 24;
const TOP = 40;
const BOTTOM = 30;

// Compute cumulative y positions (separators are shorter)
const rowY = [];
let curY = 0;
rows.forEach(r => {
  rowY.push(curY);
  curY += r.is_separator ? SEP_H : ROW_H;
});
const totalH = curY;
const svgH = TOP + totalH + BOTTOM;

const container = document.getElementById("chart-container");
const svgW = Math.max(900, window.innerWidth);

const svg = d3.select(container)
  .append("svg")
    .attr("width", svgW)
    .attr("height", svgH);

// Time scale
const allTs = dots.map(d => d.date_ts);
const tMin = d3.min(allTs);
const tMax = d3.max(allTs);
const xScale = d3.scaleTime()
  .domain([new Date(tMin - 3*24*3600*1000), new Date(tMax + 3*24*3600*1000)])
  .range([LEFT_MARGIN, svgW - RIGHT_MARGIN]);

// Row background bands
rows.forEach((r, i) => {
  const h = r.is_separator ? SEP_H : ROW_H;
  svg.append("rect")
    .attr("x", 0)
    .attr("y", TOP + rowY[i])
    .attr("width", svgW)
    .attr("height", h)
    .attr("fill", r.band_color)
    .attr("opacity", r.is_separator ? 0.5 : 0.85);
});

// Row labels
rows.forEach((r, i) => {
  const h = r.is_separator ? SEP_H : ROW_H;
  const cy = TOP + rowY[i] + h * 0.68;
  if (r.is_separator) {
    // Separator: institution name, slightly larger, italic, left-anchored
    svg.append("text")
      .attr("x", 6)
      .attr("y", cy)
      .attr("font-size", "9.5px")
      .attr("font-style", "italic")
      .attr("fill", r.label_color)
      .attr("opacity", 0.85)
      .text(r.label);
  } else {
    // Regular author row
    const maxChars = 30;
    const label = r.label.length > maxChars ? r.label.slice(0, maxChars - 1) + "…" : r.label;
    svg.append("text")
      .attr("x", LEFT_MARGIN - 8)
      .attr("y", cy)
      .attr("text-anchor", "end")
      .attr("font-size", "10px")
      .attr("fill", r.label_color)
      .text(label);
  }
});

// X-axis gridlines (monthly)
const xAxis = d3.axisTop(xScale)
  .ticks(d3.timeMonth.every(1))
  .tickFormat(d3.timeFormat("%b %Y"));

svg.append("g")
  .attr("transform", `translate(0,${TOP})`)
  .call(xAxis)
  .call(g => g.selectAll("text").attr("fill", "#94a3b8").attr("font-size", "10px"))
  .call(g => g.select(".domain").attr("stroke", "#334155"))
  .call(g => g.selectAll(".tick line")
    .clone()
    .attr("y2", totalH)
    .attr("stroke", "#1e293b")
    .attr("stroke-opacity", 0.7));

// Dots
const tooltip = document.getElementById("tooltip");

svg.selectAll(".dot")
  .data(dots)
  .join("circle")
    .attr("class", "dot")
    .attr("cx", d => xScale(new Date(d.date_ts)))
    .attr("cy", d => {
      const ri = d.row_idx;
      const h = rows[ri] ? (rows[ri].is_separator ? SEP_H : ROW_H) : ROW_H;
      return TOP + rowY[ri] + h * 0.5;
    })
    .attr("r", 4)
    .attr("fill", d => STANCE_COLORS[d.stance] || "#94a3b8")
    .attr("opacity", 0.87)
    .attr("stroke", "#0f172a")
    .attr("stroke-width", 0.5)
  .on("mousemove", (event, d) => {
    tooltip.style.display = "block";
    tooltip.style.left = (event.clientX + 14) + "px";
    tooltip.style.top = (event.clientY - 10) + "px";
    const dateStr = new Date(d.date_ts)
      .toLocaleDateString("en-US", {year:"numeric", month:"short", day:"numeric"});
    tooltip.innerHTML = `
      <strong>${d.author}</strong><br>
      ${d.institution}<br>
      ${dateStr}<br>
      <span style="color:${STANCE_COLORS[d.stance]}">● ${d.stance}</span>
      ${d.argument_type ? " &nbsp;|&nbsp; " + d.argument_type : ""}<br>
      ${d.key_point ? "<em>" + d.key_point + "</em>" : ""}
    `;
  })
  .on("mouseleave", () => { tooltip.style.display = "none"; });
</script>
<script>
function toggleTheme() {
  var root = document.documentElement;
  var btn = document.getElementById('theme-toggle');
  var isDark = root.getAttribute('data-theme') === 'dark';
  if (isDark) {
    root.setAttribute('data-theme', 'light');
    btn.textContent = '🌙 Dark';
    document.querySelectorAll('svg text').forEach(function(t) {
      var f = t.getAttribute('fill') || t.style.fill;
      if (!f || f === '#94a3b8' || f === 'rgb(148, 163, 184)') t.style.fill = '#4a5568';
    });
  } else {
    root.setAttribute('data-theme', 'dark');
    btn.textContent = '☀ Light';
    document.querySelectorAll('svg text').forEach(function(t) {
      var f = t.getAttribute('fill') || t.style.fill;
      if (!f || f === '#4a5568' || f === 'rgb(74, 85, 104)') t.style.fill = '#94a3b8';
    });
  }
}
</script>
